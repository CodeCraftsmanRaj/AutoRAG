name: PR Lint

on:
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r rag-app/requirements.txt
      - name: Lint and tests
        env:
          PYTHONPATH: rag-app
        run: |
          python -m compileall rag-app/app
          pytest -q rag-app/tests -k 'not rag_eval'

