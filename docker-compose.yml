version: "3.9"

services:
  rag-app:
    build:
      context: ./rag-app
      dockerfile: Dockerfile
    container_name: auto-rag-app
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      VECTOR_DB_PATH: /data/chroma
      RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD:-0.75}
    volumes:
      - ./docs:/app/docs:ro
      - rag_chroma_data:/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  rag_chroma_data:
