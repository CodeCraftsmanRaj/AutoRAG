services:
  rag-app:
    build:
      context: ./rag-app
      dockerfile: Dockerfile
    container_name: auto-rag-app
    env_file:
      - .env
    ports:
      - "${RAG_API_PORT:-8000}:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-models/gemini-embedding-001}
      VECTOR_DB_PATH: /data/chroma
      RAG_SCORE_THRESHOLD: ${RAG_SCORE_THRESHOLD:-0.75}
    volumes:
      - ./docs:/app/docs:ro
      - rag_chroma_data:/data/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: auto-rag-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - rag-app

  grafana:
    image: grafana/grafana:11.2.0
    container_name: auto-rag-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/rag-dashboard.json:/var/lib/grafana/dashboards/rag-dashboard.json:ro
    depends_on:
      - prometheus

  jenkins:
    build:
      context: ./jenkins/local
      dockerfile: Dockerfile
    container_name: auto-rag-jenkins
    user: root
    ports:
      - "${JENKINS_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace/Auto-RAG

  sonarqube-db:
    image: postgres:16-alpine
    container_name: auto-rag-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:latest
    container_name: auto-rag-sonarqube
    depends_on:
      - sonarqube-db
    ports:
      - "${SONARQUBE_PORT:-9000}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  rag_chroma_data:
  prometheus_data:
  grafana_data:
  jenkins_home:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
